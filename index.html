        const buildCateSlots = (cateCd) => {
            const slots = ['', '', '', ''];
            if (!cateCd) return slots;
            if (cateCd.length <= 3) {
                slots[0] = cateCd;
                return slots;
            }
            const levelCount = cateCd.length / 3;
            for (let i = 0; i < Math.min(levelCount, 4); i++) {
                slots[i] = cateCd.substring(0, (i + 1) * 3);
            }
            return slots;
        };

        const FOREIGN_CATALOG_SORT = [
            { value: 'ko', label: '한글국가명순' },
            { value: 'en', label: '영문국가명순' },
            { value: 'major', label: '대분류순' },
        ];

        const sortTreeChildren = (node, mode) => {
            if (!node.children || node.children.length === 0) return { ...node };
            const children = node.children.map(child => sortTreeChildren(child, mode));
            const sorted = [...children].sort((a, b) => {
                if (mode === 'major') return (a.order ?? 0) - (b.order ?? 0);
                if (mode === 'en') {
                    const ae = (a.labelEn || a.label || '').toLowerCase();
                    const be = (b.labelEn || b.label || '').toLowerCase();
                    return ae.localeCompare(be, 'en');
                }
                const ak = a.labelKo || a.label || '';
                const bk = b.labelKo || b.label || '';
                return ak.localeCompare(bk, 'ko');
            });
            return { ...node, children: sorted };
        };

        const getSortedForeignTree = () => {
            if (typeof FOREIGN_BANKNOTE_RAW === 'undefined') {
                return { cateCd: '001', label: '외국지폐', children: [] };
            }
            return sortTreeChildren(FOREIGN_BANKNOTE_RAW, 'major');
        };

        const collectNineDigitNodes = (node, result = []) => {
            if (node.cateCd && node.cateCd.length === 9) {
                result.push(node);
            }
            if (node.children) {
                node.children.forEach(child => collectNineDigitNodes(child, result));
            }
            return result;
        };

        const isBritishOrFrenchTerritory = (cateCd) =>
            cateCd.startsWith('001009') || cateCd.startsWith('001005');

        const getCountryLabelKey = (node, mode) =>
            mode === 'en' ? (node.labelEn || node.label || '') : (node.labelKo || node.label || '');

        const findNodeByCateCd = (node, code) => {
            if (node.cateCd === code) return node;
            if (node.children) {
                for (const child of node.children) {
                    const found = findNodeByCateCd(child, code);
                    if (found) return found;
                }
            }
            return null;
        };

        const dedupeBritishFrenchTerritories = (countries, mode) => {
            const byLabel = {};
            countries.forEach(node => {
                const key = getCountryLabelKey(node, mode);
                if (!byLabel[key]) byLabel[key] = [];
                byLabel[key].push(node);
            });
            return countries.filter(node => {
                const key = getCountryLabelKey(node, mode);
                if (byLabel[key].length <= 1) return true;
                return !isBritishOrFrenchTerritory(node.cateCd);
            });
        };

        const getForeignFlatCountries = (mode) => {
            if (typeof FOREIGN_BANKNOTE_RAW === 'undefined') return [];
            let countries = collectNineDigitNodes(FOREIGN_BANKNOTE_RAW);
            countries = dedupeBritishFrenchTerritories(countries, mode);

            const testNote = findNodeByCateCd(FOREIGN_BANKNOTE_RAW, '001013');
            if (testNote && !countries.some(c => c.cateCd === '001013')) {
                countries.push(testNote);
            }

            return [...countries].sort((a, b) => {
                if (mode === 'en') {
                    const ae = (a.labelEn || a.label || '').toLowerCase();
                    const be = (b.labelEn || b.label || '').toLowerCase();
                    return ae.localeCompare(be, 'en');
                }
                const ak = a.labelKo || a.label || '';
                const bk = b.labelKo || b.label || '';
                return ak.localeCompare(bk, 'ko');
            });
        };


        function ForeignCountryList({ countries, sortMode, selectedId, onSelect, onSelectAndSearch }) {
            return (
                <div className="flex-1 min-h-0 overflow-y-auto border border-amber-100 rounded-lg bg-amber-50/30 p-2">
                    {countries.map(node => {
                        const itemId = node.cateCd;
                        const isSelected = selectedId === itemId;
                        const displayLabel = sortMode === 'en' && node.labelEn
                            ? node.labelEn
                            : (node.labelKo || node.label);
                        const subLabel = sortMode === 'en'
                            ? (node.labelKo || node.label)
                            : (node.labelEn || '');
                        const selection = { type: 'category', cateCd: node.cateCd, id: itemId, label: displayLabel };
                        return (
                            <div
                                key={itemId}
                                role="button"
                                tabIndex={0}
                                onClick={(e) => { e.currentTarget.focus(); onSelect(selection); }}
                                onDoubleClick={(e) => { e.preventDefault(); onSelectAndSearch(selection); }}
                                onKeyDown={(e) => {
                                    if (e.key === 'Enter') {
                                        e.preventDefault();
                                        onSelectAndSearch(selection);
                                    }
                                }}
                                className={`flex items-center gap-2 py-2.5 px-2 rounded-lg cursor-pointer text-sm transition-colors outline-none focus:ring-2 focus:ring-amber-400 ${isSelected ? 'bg-amber-100 text-amber-900 font-bold' : 'hover:bg-slate-50 text-gray-700'}`}
                            >
                                <span className="text-amber-400 text-sm">●</span>
                                <span className="flex-1">{displayLabel}</span>
                                {subLabel && <span className="text-xs text-gray-400">{subLabel}</span>}
                            </div>
                        );
                    })}
                </div>
            );
        }

        function CatalogTree({ tree, expanded, onToggle, selectedId, onSelect, onSelectAndSearch, categoryFastSearch = false, itemFastSearch = false }) {
            const renderNode = (node, depth = 0, parentCateCd = null) => {
                const nodeId = node.cateCd || node.label;
                const hasChildren = node.children && node.children.length > 0;
                const hasItems = node.items && node.items.length > 0;
                const isKeywordLeaf = node.keyword && !hasChildren && !hasItems;

                if (isKeywordLeaf) {
                    const itemId = `kw-${node.label}`;
                    const itemSelected = selectedId === itemId;
                    const targetCate = node.cateCd || parentCateCd || '003';
                    const selection = { type: 'item', cateCd: targetCate, id: itemId, label: node.label, keyword: node.keyword };
                    return (
                        <div
                            key={itemId}
                            role={itemFastSearch ? 'button' : undefined}
                            tabIndex={itemFastSearch ? 0 : undefined}
                            onClick={(e) => { e.currentTarget.focus(); onSelect(selection); }}
                            onDoubleClick={itemFastSearch ? (e) => { e.preventDefault(); onSelectAndSearch(selection); } : undefined}
                            onKeyDown={itemFastSearch ? (e) => {
                                if (e.key === 'Enter') {
                                    e.preventDefault();
                                    onSelectAndSearch(selection);
                                }
                            } : undefined}
                            className={`flex items-center gap-2 py-2.5 px-2 rounded-lg cursor-pointer text-sm transition-colors ${itemFastSearch ? 'outline-none focus:ring-2 focus:ring-amber-400' : ''} ${itemSelected ? 'bg-amber-100 text-amber-900 font-bold' : 'hover:bg-slate-50 text-gray-600'}`}
                            style={{ paddingLeft: `${depth * 18 + 28}px` }}
                        >
                            <span className="text-amber-400 text-sm">●</span>
                            <span className="flex-1">{node.label}</span>
                            <span className="text-xs text-gray-400 font-mono hidden sm:inline">{node.keyword}</span>
                        </div>
                    );
                }

                const isExpandable = hasChildren || hasItems;
                const isExpanded = expanded.has(nodeId);
                const isSelected = selectedId === nodeId;

                return (
                    <div key={nodeId} className="select-none">
                        <div
                            className={`flex items-center gap-2 py-2.5 px-2 rounded-lg cursor-pointer transition-colors ${isSelected ? 'bg-amber-100 text-amber-900 font-bold' : 'hover:bg-slate-50 text-gray-700'}`}
                            style={{ paddingLeft: `${depth * 18 + 8}px` }}
                        >
                            <button
                                type="button"
                                onClick={(e) => { e.stopPropagation(); if (isExpandable) onToggle(nodeId); }}
                                className={`w-6 h-6 flex items-center justify-center shrink-0 text-gray-400 ${isExpandable ? 'hover:text-amber-600' : 'invisible'}`}
                            >
                                {isExpanded ? Icons.ChevronDown : Icons.ChevronRight}
                            </button>
                            <span
                                className={`flex-1 text-sm ${categoryFastSearch ? 'outline-none focus:ring-2 focus:ring-amber-400 rounded' : ''}`}
                                role={categoryFastSearch ? 'button' : undefined}
                                tabIndex={categoryFastSearch ? 0 : undefined}
                                onClick={(e) => { e.currentTarget.focus(); onSelect({ type: 'category', cateCd: node.cateCd, id: nodeId, label: node.label }); }}
                                onDoubleClick={categoryFastSearch ? (e) => {
                                    e.preventDefault();
                                    onSelectAndSearch({ type: 'category', cateCd: node.cateCd, id: nodeId, label: node.label });
                                } : undefined}
                                onKeyDown={categoryFastSearch ? (e) => {
                                    if (e.key === 'Enter') {
                                        e.preventDefault();
                                        onSelectAndSearch({ type: 'category', cateCd: node.cateCd, id: nodeId, label: node.label });
                                    }
                                } : undefined}
                            >
                                {node.label}
                                {node.labelEn && <span className="ml-1 text-xs text-gray-400 font-normal">{node.labelEn}</span>}
                            </span>
                        </div>
                        {isExpanded && hasChildren && node.children.map(child => renderNode(child, depth + 1, node.cateCd))}
                        {isExpanded && hasItems && node.items.map((item, idx) => {
                            const itemId = `${node.cateCd}-${idx}`;
                            const itemSelected = selectedId === itemId;
                            const selection = { type: 'item', cateCd: node.cateCd, id: itemId, label: item.label, keyword: item.keyword };
                            return (
                                <div
                                    key={itemId}
                                    role={itemFastSearch ? 'button' : undefined}
                                    tabIndex={itemFastSearch ? 0 : undefined}
                                    onClick={(e) => { e.currentTarget.focus(); onSelect(selection); }}
                                    onDoubleClick={itemFastSearch ? (e) => { e.preventDefault(); onSelectAndSearch(selection); } : undefined}
                                    onKeyDown={itemFastSearch ? (e) => {
                                        if (e.key === 'Enter') {
                                            e.preventDefault();
                                            onSelectAndSearch(selection);
                                        }
                                    } : undefined}
                                    className={`flex items-center gap-2 py-2.5 px-2 rounded-lg cursor-pointer text-sm transition-colors ${itemFastSearch ? 'outline-none focus:ring-2 focus:ring-amber-400' : ''} ${itemSelected ? 'bg-amber-100 text-amber-900 font-bold' : 'hover:bg-slate-50 text-gray-600'}`}
                                    style={{ paddingLeft: `${(depth + 1) * 18 + 28}px` }}
                                >
                                    <span className="text-amber-400 text-sm">●</span>
                                    <span className="flex-1">{item.label}</span>
                                    <span className="text-xs text-gray-400 font-mono hidden sm:inline">{item.keyword}</span>
                                </div>
                            );
                        })}
                    </div>
                );
            };
            return (
                <div className="flex-1 min-h-0 overflow-y-auto border border-amber-100 rounded-lg bg-amber-50/30 p-2">
                    {renderNode(tree)}
                </div>
            );
        }

        const formatSearchKeyword = (raw) =>
            (raw || '').trim().split(/[\s%]+/).filter(Boolean).join('%');

        function CatalogHint() {
            return (
                <span className="text-xs shrink-0">
                    <span className="text-sky-700 font-medium">클릭 시 자동 설정</span>
                    <span className="text-slate-300 mx-1">·</span>
                    <span className="donmoa-brand-text font-semibold">더블클릭/Enter로 검색</span>
                </span>
            );
        }

        function App() {
            const [inputValue, setInputValue] = useState('');
            const [selectedCat, setSelectedCat] = useState('');
            const [selectedCatalogId, setSelectedCatalogId] = useState('');
            const [selectedCatalogLabel, setSelectedCatalogLabel] = useState('');
            const [expandedNodes, setExpandedNodes] = useState(new Set());
            const [foreignTreeSort, setForeignTreeSort] = useState('ko');
            const [sortMethod, setSortMethod] = useState('');
            const [itemsPerPage, setItemsPerPage] = useState('20');

            const isKoreanBanknote = selectedCat === '003' || (selectedCat && selectedCat.startsWith('003'));
            const isForeignBanknote = selectedCat === '001' || (selectedCat && selectedCat.startsWith('001'));
            const isKoreanCoin = selectedCat === '004' || (selectedCat && selectedCat.startsWith('004'));
            const isCatalogOpen = isKoreanBanknote || isForeignBanknote || isKoreanCoin;
            const foreignTree = getSortedForeignTree();
            const foreignFlatCountries = foreignTreeSort !== 'major'
                ? getForeignFlatCountries(foreignTreeSort)
                : [];

            const handleCategoryClick = (id) => {
                if (id === '003') {
                    if (isKoreanBanknote) {
                        setSelectedCat('');
                        setSelectedCatalogId('');
                        setSelectedCatalogLabel('');
                    } else {
                        setSelectedCat('003');
                        setSelectedCatalogId('003');
                        setSelectedCatalogLabel('한국지폐');
                        setExpandedNodes(new Set(['003']));
                    }
                    return;
                }
                if (id === '001') {
                    if (isForeignBanknote) {
                        setSelectedCat('');
                        setSelectedCatalogId('');
                        setSelectedCatalogLabel('');
                    } else {
                        setSelectedCat('001');
                        setSelectedCatalogId('001');
                        setSelectedCatalogLabel('외국지폐');
                        setForeignTreeSort('ko');
                        setExpandedNodes(new Set(['001']));
                    }
                    return;
                }
                if (id === '004') {
                    if (isKoreanCoin) {
                        setSelectedCat('');
                        setSelectedCatalogId('');
                        setSelectedCatalogLabel('');
                    } else {
                        setSelectedCat('004');
                        setSelectedCatalogId('004');
                        setSelectedCatalogLabel('한국주화');
                        setExpandedNodes(new Set(['004']));
                    }
                    return;
                }
                setSelectedCat(prev => prev === id ? '' : id);
                setSelectedCatalogId('');
                setSelectedCatalogLabel('');
            };

            const handleToggleNode = (nodeId) => {
                setExpandedNodes(prev => {
                    const next = new Set(prev);
                    if (next.has(nodeId)) next.delete(nodeId);
                    else next.add(nodeId);
                    return next;
                });
            };

            const handleCatalogSelect = (selection) => {
                setSelectedCat(selection.cateCd);
                setSelectedCatalogId(selection.id);
                setSelectedCatalogLabel(selection.label);
                if (selection.type === 'item') {
                    setInputValue(selection.keyword.replace(/%/g, ' '));
                } else {
                    setInputValue('');
                }
                setExpandedNodes(prev => {
                    const next = new Set(prev);
                    if (!selection.cateCd) return next;
                    const root = selection.cateCd.substring(0, 3);
                    next.add(root);
                    for (let len = 6; len <= selection.cateCd.length; len += 3) {
                        next.add(selection.cateCd.substring(0, len));
                    }
                    return next;
                });
            };

            const resetAll = () => {
                setInputValue(''); setSelectedCat('');
                setSelectedCatalogId(''); setSelectedCatalogLabel('');
                setExpandedNodes(new Set());
                setForeignTreeSort('ko');
                setSortMethod(''); setItemsPerPage('20');
            };

            const buildSearchUrl = (keyword, cateCd = selectedCat) => {
                const baseUrl = 'https://donmoa.kr/goods/goods_search.php';
                const combinedKeyword = keyword || '';

                if (cateCd) {
                    const slots = buildCateSlots(cateCd);

                    const params = ['mode=quick'];
                    slots.forEach(val => params.push(`quickCateGoods[]=${val}`));
                    params.push('goodsPrice[]=', 'goodsPrice[]=');
                    params.push(`keyword=${encodeURIComponent(combinedKeyword)}`);
                    if (sortMethod) params.push(`sort=${sortMethod}`);
                    params.push(`pageNum=${itemsPerPage}`);
                    return `${baseUrl}?${params.join('&')}`;
                }

                const params = [`keyword=${encodeURIComponent(combinedKeyword)}`];
                if (sortMethod) params.push(`sort=${sortMethod}`);
                params.push(`pageNum=${itemsPerPage}`);
                return `${baseUrl}?${params.join('&')}`;
            };

            const handleCatalogSelectAndSearch = (selection) => {
                const searchText = selection.type === 'item'
                    ? selection.keyword.replace(/%/g, ' ')
                    : inputValue;
                handleCatalogSelect(selection);
                window.open(buildSearchUrl(formatSearchKeyword(searchText), selection.cateCd), '_blank');
            };

            const executeSearch = () => {
                window.open(buildSearchUrl(formatSearchKeyword(inputValue)), '_blank');
            };

            return (
                <div className="h-screen p-2 overflow-hidden">
                    <div className="w-full max-w-5xl mx-auto h-full bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200 flex flex-col">
                        
                        <div className="bg-white px-4 py-2 border-b border-gray-100 grid grid-cols-3 items-center shrink-0">
                            <div>
                                <h1 className="text-lg font-extrabold donmoa-brand-text flex items-center gap-2">
                                    <span className="donmoa-brand-text">{Icons.Search}</span>
                                    돈모아 통합 검색
                                </h1>
                                <p className="text-gray-500 text-xs">
                                    <b>새 창</b>에서 <a href="https://donmoa.kr" target="_blank" rel="noopener noreferrer" className="text-amber-600 underline">donmoa.kr</a> 검색 · 띄어쓰기=<b>AND</b>
                                </p>
                            </div>
                            <div className="flex justify-center items-center">
                                <a href="https://donmoa.kr" target="_blank" rel="noopener noreferrer">
                                    <img src="donmoa_logo.png" alt="돈모아 화폐수집전문점" className="h-10 w-auto object-contain" />
                                </a>
                            </div>
                            <div className="flex items-center justify-end gap-1.5">
                                <button
                                    onClick={executeSearch}
                                    className="flex items-center gap-1 px-3 py-1.5 donmoa-brand-bg text-white text-xs font-bold rounded-md shadow transition-colors"
                                >
                                    {Icons.Search} 검색 (새 창)
                                </button>
                                <button onClick={resetAll} className="flex items-center gap-1 px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-md text-xs font-bold text-gray-600 transition-colors">
                                    {Icons.Reset} 초기화
                                </button>
                            </div>
                        </div>

                        <div className="px-4 py-2 flex flex-col flex-1 min-h-0 overflow-hidden gap-2">
                            
                            <div className="shrink-0">
                                <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mb-1 w-full">
                                    <label className="text-xs font-bold text-gray-700 shrink-0">검색어 입력</label>
                                    {selectedCat && (
                                        <span className="text-xs donmoa-brand-text font-bold leading-snug flex-1 min-w-[200px]">⚠️ 카테고리가 선택된 경우, 해당 카테고리 내에서만 검색이 진행됩니다.</span>
                                    )}
                                    <span className="text-xs donmoa-brand-badge px-1.5 py-0.5 rounded-full font-bold shrink-0 ml-auto">띄어쓰기=AND</span>
                                </div>
                                <div className="relative">
                                    <input 
                                        type="text" 
                                        value={inputValue}
                                        onChange={(e) => setInputValue(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') {
                                                e.preventDefault();
                                                executeSearch();
                                            }
                                        }}
                                        placeholder="예: 정10원 유번호  ·  Enter로 검색  ·  또는 '검색 (새 창)' 버튼 클릭으로 검색"
                                        className="w-full h-9 pl-3 pr-8 border border-gray-200 rounded-lg text-sm focus:border-amber-500 focus:outline-none transition-colors"
                                    />
                                    {inputValue && (
                                        <button onClick={() => setInputValue('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500">
                                            {Icons.Close}
                                        </button>
                                    )}
                                </div>
                            </div>

                            <hr className="border-gray-100 shrink-0"/>

                            <div className={`flex flex-col min-h-0 ${isCatalogOpen ? 'flex-1' : 'shrink-0'}`}>
                                <div className="shrink-0">
                                <div className="flex items-center gap-1.5 mb-1">
                                    <span className="text-gray-600 scale-90">{Icons.Category}</span>
                                    <span className="text-[10px] donmoa-brand-text font-bold">카테고리 1개만 선택가능 / 클릭=선택 / 다시 클릭=해제</span>
                                </div>
                                <div className="flex flex-wrap gap-1.5">
                                    {CATEGORIES.map(cat => {
                                        const isActive = cat.id === '003'
                                            ? isKoreanBanknote
                                            : cat.id === '001'
                                                ? isForeignBanknote
                                                : cat.id === '004'
                                                    ? isKoreanCoin
                                                    : selectedCat === cat.id;
                                        return (
                                            <div 
                                                key={cat.id}
                                                onClick={() => handleCategoryClick(cat.id)}
                                                className={`
                                                    flex items-center gap-1 px-2 py-1 rounded border cursor-pointer transition-all select-none text-xs
                                                    ${isActive
                                                        ? 'border-amber-500 bg-amber-50 text-amber-800 font-bold' 
                                                        : 'border-gray-200 bg-white text-gray-600 hover:border-gray-300'
                                                    }
                                                `}
                                            >
                                                <span className="scale-75">{isActive ? Icons.RadioOn : Icons.RadioOff}</span>
                                                {cat.label}
                                            </div>
                                        );
                                    })}
                                </div>
                                </div>

                                {isForeignBanknote && (
                                    <div className="flex flex-col flex-1 min-h-0 mt-1.5">
                                        <div className="flex items-center justify-between mb-1 shrink-0 gap-2">
                                            <span className="text-sm font-bold text-amber-800">외국지폐 카탈로그</span>
                                            <CatalogHint />
                                        </div>
                                        <div className="flex flex-wrap gap-1 mb-1 shrink-0">
                                            {FOREIGN_CATALOG_SORT.map(opt => (
                                                <button
                                                    key={opt.value}
                                                    onClick={() => setForeignTreeSort(opt.value)}
                                                    className={`px-2 py-0.5 text-xs rounded border transition-colors ${foreignTreeSort === opt.value ? 'bg-amber-600 text-white border-amber-600' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-400'}`}
                                                >
                                                    {opt.label}
                                                </button>
                                            ))}
                                        </div>
                                        {foreignTreeSort === 'major' ? (
                                            <CatalogTree
                                                tree={foreignTree}
                                                expanded={expandedNodes}
                                                onToggle={handleToggleNode}
                                                selectedId={selectedCatalogId}
                                                onSelect={handleCatalogSelect}
                                                onSelectAndSearch={handleCatalogSelectAndSearch}
                                                categoryFastSearch
                                            />
                                        ) : (
                                            <ForeignCountryList
                                                countries={foreignFlatCountries}
                                                sortMode={foreignTreeSort}
                                                selectedId={selectedCatalogId}
                                                onSelect={handleCatalogSelect}
                                                onSelectAndSearch={handleCatalogSelectAndSearch}
                                            />
                                        )}
                                    </div>
                                )}

                                {isKoreanBanknote && (
                                    <div className="flex flex-col flex-1 min-h-0 mt-1.5">
                                        <div className="flex items-center justify-between mb-1 shrink-0">
                                            <span className="text-sm font-bold text-amber-800">한국지폐 카탈로그</span>
                                            <CatalogHint />
                                        </div>
                                        <CatalogTree
                                            tree={KOREAN_BANKNOTE_TREE}
                                            expanded={expandedNodes}
                                            onToggle={handleToggleNode}
                                            selectedId={selectedCatalogId}
                                            onSelect={handleCatalogSelect}
                                            onSelectAndSearch={handleCatalogSelectAndSearch}
                                            itemFastSearch
                                        />
                                    </div>
                                )}

                                {isKoreanCoin && (
                                    <div className="flex flex-col flex-1 min-h-0 mt-1.5">
                                        <div className="flex items-center justify-between mb-1 shrink-0">
                                            <span className="text-sm font-bold text-amber-800">한국주화 카탈로그</span>
                                            <CatalogHint />
                                        </div>
                                        <CatalogTree
                                            tree={KOREAN_COIN_TREE}
                                            expanded={expandedNodes}
                                            onToggle={handleToggleNode}
                                            selectedId={selectedCatalogId}
                                            onSelect={handleCatalogSelect}
                                            onSelectAndSearch={handleCatalogSelectAndSearch}
                                            categoryFastSearch
                                        />
                                    </div>
                                )}

                                {isCatalogOpen && selectedCatalogLabel && (
                                    <div className="mt-1 text-xs text-amber-700 bg-amber-50 px-2 py-1.5 rounded shrink-0">
                                        선택: <b>{selectedCatalogLabel}</b>
                                    </div>
                                )}
                            </div>

                            <hr className="border-gray-100 shrink-0"/>

                            <div className="flex items-center gap-1.5 flex-nowrap shrink-0">
                                <span className="text-gray-600 scale-90 shrink-0">{Icons.Filter}</span>
                                <span className="text-xs font-bold text-gray-700 shrink-0">정렬</span>
                                <div className="flex flex-nowrap gap-1 overflow-x-auto">
                                    {SORT_OPTIONS.map(opt => (
                                        <button 
                                            key={opt.value}
                                            onClick={() => setSortMethod(opt.value)}
                                            className={`px-2 py-0.5 text-xs rounded border whitespace-nowrap transition-colors ${sortMethod === opt.value ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-400'}`}
                                        >
                                            {opt.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="flex items-center gap-1.5 flex-nowrap shrink-0">
                                <span className="text-gray-600 scale-90 shrink-0">{Icons.Eye}</span>
                                <span className="text-xs font-bold text-gray-700 shrink-0">보기</span>
                                <div className="flex flex-nowrap gap-1">
                                    {PAGE_SIZE_OPTIONS.map(size => (
                                        <button 
                                            key={size}
                                            onClick={() => setItemsPerPage(size)}
                                            className={`px-2 py-0.5 text-xs rounded border whitespace-nowrap transition-colors ${itemsPerPage === size ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-400'}`}
                                        >
                                            {size}개
                                        </button>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
